<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sultan Aldeiro</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset styles to ensure proper display */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            opacity: 0; /* Start invisible and fade in with JS */
        }
        
        /* Contact page container */
        .contact-container {
            min-height: 100vh;
            width: 100%;
            padding: 8rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .contact-title {
            font-family: var(--font-secondary);
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 4rem;
            text-align: center;
            color: white;
            position: relative;
        }
        
        .contact-title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--color-accent);
        }
        
        /* Contact cards */
        .contacts-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
        }
        
        .contact-card {
            height: 80px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            transition: all 0.5s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 0px solid transparent;
        }
        
        .contact-card:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            margin-right: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            transition: all 0.5s ease;
            flex-shrink: 0;
        }
        
        .contact-card:hover .card-icon {
            transform: scale(1.2);
        }
        
        .card-text {
            font-family: var(--font-secondary);
            font-size: 2rem;
            font-weight: 700;
            transition: all 0.5s ease;
            color: white;
        }
        
        .contact-card:hover .card-text {
            transform: translateX(10px);
        }
        
        /* Static center card */
        .contact-card.static {
            background-color: var(--color-accent);
            justify-content: center;
            cursor: default;
        }
        
        .contact-card.static:hover {
            transform: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .contact-card.static .card-text {
            color: white;
        }
        
        /* Platform-specific hover effects */
        .contact-card.linkedin:hover {
            border-left: 4px solid #0077B5;
        }
        
        .contact-card.github:hover {
            border-left: 4px solid #2b3137;
        }
        
        .contact-card.gmail:hover {
            border-left: 4px solid #D14836;
        }
        
        .contact-card.instagram:hover {
            border-left: 4px solid #C13584;
        }
        
        /* Menu button styling */
        .menu-button {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .menu-icon {
            width: 24px;
            height: 18px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all 0.3s ease;
        }
        
        /* Menu overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .menu-open .menu-overlay {
            opacity: 1;
            visibility: visible;
        }
        
        .menu-nav ul {
            list-style: none;
            padding: 0;
        }
        
        .menu-nav li {
            margin: 2rem 0;
        }
        
        .menu-link {
            font-family: var(--font-secondary);
            font-size: 4rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            position: relative;
        }
        
        .menu-link.active {
            color: var(--color-accent);
        }
        
        /* Page transition indicator */
        .page-transition-indicator {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: var(--color-accent);
            background-color: rgba(0, 0, 0, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: all 0.5s ease;
            z-index: 95;
            cursor: pointer;
        }
        
        .page-transition-indicator:hover {
            opacity: 1;
        }
        
        .page-transition-indicator.prev {
            left: 2rem;
        }
        
        .page-transition-indicator.prev::after {
            content: '←';
        }
        
        /* Responsive styles */
        @media screen and (max-width: 992px) {
            .contact-container {
                padding: 6rem 2rem;
            }
            
            .contact-title {
                font-size: 3rem;
                margin-bottom: 3rem;
            }
            
            .contact-card {
                height: 70px;
            }
            
            .card-text {
                font-size: 1.8rem;
            }
        }
        
        @media screen and (max-width: 768px) {
            .contact-container {
                padding: 5rem 2rem;
            }
            
            .contact-title {
                font-size: 2.5rem;
                margin-bottom: 2.5rem;
            }
            
            .contact-card {
                height: 60px;
                padding: 0 1.5rem;
            }
            
            .card-icon {
                width: 30px;
                height: 30px;
                margin-right: 1rem;
            }
            
            .card-text {
                font-size: 1.5rem;
            }
            
            .menu-link {
                font-size: 3rem;
            }
        }
        
        @media screen and (max-width: 480px) {
            .contact-container {
                padding: 4rem 1.5rem;
            }
            
            .contact-title {
                font-size: 2rem;
                margin-bottom: 2rem;
            }
            
            .contact-card {
                height: 50px;
                padding: 0 1rem;
            }
            
            .card-text {
                font-size: 1.2rem;
            }
            
            .menu-link {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    </main>

    <!-- Navigation menu button -->
    <div class="menu-button">
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Full-screen menu -->
    <div class="menu-overlay">
        <div class="menu-content">
            <nav class="menu-nav">
                <ul>
                    <li><a href="index.html" class="menu-link">Home</a></li>
                    <li><a href="about.html" class="menu-link">About</a></li>
                    <li><a href="projects.html" class="menu-link">Projects</a></li>
                    <li><a href="contact.html" class="menu-link active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Add page transition indicators -->
    <div class="page-transition-indicator prev"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script>
        // Self-contained script for contact page to prevent disappearing
        document.addEventListener('DOMContentLoaded', function() {
            // Fade in the page with delay
            setTimeout(function() {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '1';
            }, 100);
            
            // Menu toggle
            const menuButton = document.querySelector('.menu-button');
            const body = document.body;
            
            menuButton.addEventListener('click', function() {
                body.classList.toggle('menu-open');
                
                if (body.classList.contains('menu-open')) {
                    // Animate menu items
                    const menuLinks = document.querySelectorAll('.menu-link');
                    menuLinks.forEach((link, index) => {
                        link.style.opacity = '0';
                        link.style.transform = 'translateY(20px)';
                        
                        setTimeout(() => {
                            link.style.transition = 'all 0.5s ease';
                            link.style.opacity = '1';
                            link.style.transform = 'translateY(0)';
                        }, 100 + (index * 100));
                    });
                }
            });
            
            // Simple GSAP animation for contact cards with staggered delay
            gsap.from('.contact-title', {
                y: 30,
                opacity: 0,
                duration: 1,
                ease: "power3.out",
                delay: 0.5 // Add delay to ensure page is visible first
            });
            
            gsap.from('.contact-card', {
                y: 30,
                opacity: 0,
                duration: 1,
                stagger: 0.15,
                delay: 1, // Add more delay for card animations
                ease: "power3.out"
            });
            
            // Previous page navigation
            const prevIndicator = document.querySelector('.page-transition-indicator.prev');
            if (prevIndicator) {
                prevIndicator.addEventListener('click', function() {
                    // Animate out
                    document.body.style.opacity = '0';
                    
                    // Navigate after delay
                    setTimeout(function() {
                        window.location.href = 'projects.html';
                    }, 1000);
                });
            }
            
            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    // Animate out
                    document.body.style.opacity = '0';
                    
                    // Navigate after delay
                    setTimeout(function() {
                        window.location.href = 'projects.html';
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
